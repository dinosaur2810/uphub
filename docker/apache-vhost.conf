<VirtualHost *:80>
    DocumentRoot /var/www/html

    # Match XAMPP layout: http://localhost:8081/UpHub/...
    Alias /UpHub /var/www/html

    <Directory /var/www/html>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Root -> /UpHub/ (same entry point as XAMPP)
    RedirectMatch 302 ^/$ /UpHub/

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
